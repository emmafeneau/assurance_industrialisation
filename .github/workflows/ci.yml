name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Ruff + Mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy . --ignore-missing-imports

  test:
    name: api Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra api --extra dev

      - name: Run tests
        env:
          FREQ_MODEL_PATH: Frequence/models/catboost_calibrated.pkl
          SEV_MODEL_PATH: Severite/models/catboost_severite.pkl
          RF_POIDS_PATH: Severite/models/model_rf_poids.pkl
          DEBUG: "true"
        run: uv run pytest tests/ -v